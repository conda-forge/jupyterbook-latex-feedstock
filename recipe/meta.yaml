{% set version = "0.3.1" %}

package:
  name: jupyterbook-latex
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/j/jupyterbook-latex/jupyterbook_latex-{{ version }}.tar.gz
  sha256: 2606e27e285d58cf8a5d9fad0b0f79a0180604e15c641a6790a4bd81667f3d63

build:
  number: 1
  noarch: python
  script:
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}
    - sphinx >=3,<4
    - myst-nb
    - pyyaml
    # TODO: should be fixed in jupyter-cache, but....
    - sqlalchemy >=1.3.12,<1.4
    # this is a no-op on 3.9
    - importlib_resources


test:
  requires:
    - pip
    - python {{ python_min }}
  imports:
    - jupyterbook_latex
    - jupyterbook_latex.theme
  commands:
    - pip check

about:
  home: https://github.com/executablebooks/jupyterbook-latex
  license: BSD-3-Clause
  license_file: LICENSE
  summary: 'Jupyterbook-latex: Supporting LaTeX infrastructure for Jupyter Book'
  dev_url: https://github.com/executablebooks/jupyterbook-latex

extra:
  recipe-maintainers:
    - AakashGfude
    - conda-forge/jupyter-book
